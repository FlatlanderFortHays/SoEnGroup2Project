<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Park Now — User Portal</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="topbar">
    <a class="brand" href="index.html">🅿️ Park Now</a>
    <div id="whoami" class="whoami hidden">
      <span id="whoami-name"></span>
      <button id="logout" class="btn-link">Log out</button>
    </div>
  </header>

<main class="container">
    <!-- Login -->
    <section id="login" class="card">
      <h2>🚗 User Login</h2>
      <p class="hint">Sign in to continue.</p>
      <form id="login-form" class="row">
        <label>Username
          <input id="login-username" placeholder="Your username" autocomplete="off" />
        </label>
        <label>Password
          <input id="login-password" type="password" placeholder="Your password" autocomplete="off" />
        </label>
        <button class="btn" type="submit">Continue</button>
        <button class="btn btn-ghost" type="button" id="create-account">Create account</button>
      </form>
      <p id="login-error" class="error"></p>
    </section>

    <!-- App -->
    <section id="app" class="hidden">
      <div class="card">
        <h2>My cars</h2>
        <form id="car-form" class="grid-2">
          <input id="car-make"  placeholder="Make (e.g. Toyota)"  autocomplete="off" />
          <input id="car-model" placeholder="Model (e.g. Corolla)" autocomplete="off" />
          <!-- Options are injected by js/user.js from CarColors.PALETTE (js/carColors.js) —
               the same list simulate_fill() paints its cars from. Do not hard-code them here. -->
          <select id="car-color" title="Color"></select>
          <input id="car-plate" placeholder="License plate"        autocomplete="off" />
          <select id="car-size" title="Vehicle size">
            <option value="compact">Compact</option>
            <option value="normal" selected>Normal</option>
            <option value="large">Large</option>
          </select>
          <label class="check"><input id="car-ev" type="checkbox" /> Electric (EV)</label>
          <button class="btn" type="submit">Add car</button>
        </form>
        <p id="car-msg" class="msg error"></p>
        <ul id="car-list" class="list"></ul>
      </div>

      <div class="card">
        <h2>Book a Parking Spot</h2>
        <div class="row">
          <label>Car
            <select id="park-car"></select>
          </label>
          <label>Booking type
            <select id="booking-type">
              <option value="" disabled selected>-- Choose an Option --</option>
              <option value="now">Park Now</option>
              <option value="future">Reserve Future Date</option>
            </select>
          </label>
          <label>Hours
            <input id="park-hours" type="number" min="0.1" step="0.1" value="2" />
          </label>
        </div>

        <!-- Future Date Picker (Reveals when 'Reserve Future Date' is chosen) -->
        <div id="future-date-container" class="row hidden" style="margin-top: 1rem;">
          <label style="width: 100%;">Arrival Date & Time
            <input id="park-start-time" type="datetime-local" style="width: 100%; margin-top: 0.25rem;" />
          </label>
        </div>

        <!-- Calculated Timeline Banner positioned cleanly below all input choices -->
        <div id="reservation-summary" class="mono" style="margin-top: 1rem; padding: 0.5rem; background: #f5f5f5; border-left: 4px solid #0066cc; font-size: 0.9rem;">
          Calculated Window: <span id="calc-start" style="font-weight:600;">--</span> to <span id="calc-end" style="font-weight:600; color: #cc0000;">--</span>
          <br />
          Estimated cost: <span id="calc-cost" style="font-weight:600;">--</span>
        </div>

        <p id="park-msg" class="msg"></p>
        <p class="hint">Prices are set per garage. Click a garage below to see its exact cost here.</p>
        <ul id="garage-list" class="list"></ul>
      </div>

      <div class="card" style="margin-top: 2rem;">
        <h2>📋 My Reservations</h2>
        <p id="manage-msg" class="msg"></p>
        <ul id="my-reservations-list" class="list"></ul>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/price.js"></script>
  <script src="js/carColors.js"></script>
  <script src="js/user.js"></script>
  <script src="js/validation.js" defer></script>
</body>
</html>
