<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Park Now — Tow Company Portal</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="topbar">
    <a class="brand" href="index.html">🅿️ Park Now</a>
    <div id="whoami" class="whoami hidden">
      <span id="whoami-name"></span>
      <button id="logout" class="btn-link">Log out</button>
    </div>
  </header>

  <main class="container">
    <!-- Login -->
    <section id="login" class="card">
      <h2>🚛 Tow Company Login</h2>
      <p class="hint">Sign in to continue.</p>
      <form id="login-form" class="row">
        <label>Username
          <input id="login-username" placeholder="Your username" autocomplete="off" />
        </label>
        <label>Password
          <input id="login-password" type="password" placeholder="Your password" autocomplete="off" />
        </label>
        <button class="btn" type="submit">Continue</button>
        <button class="btn btn-ghost" type="button" id="create-account">Create account</button>
      </form>
      <p id="login-error" class="error"></p>
    </section>

    <!-- App -->
    <section id="app" class="hidden">
      <div class="card">
        <h2>Cars currently parked</h2>
        <p class="hint">Anyone <strong>not</strong> on this list for a garage is parked illegally.</p>
        <div class="row">
          <label>Garage
            <select id="tow-garage"></select>
          </label>
          <label>License plate
            <input id="tow-plate" placeholder="Search plate…" autocomplete="off" />
          </label>
          <button id="tow-refresh" class="btn btn-ghost" type="button">Refresh</button>
        </div>

        <table>
          <thead>
            <tr><th>Spot</th><th>Plate</th><th>Vehicle</th><th>Parked until</th></tr>
          </thead>
          <tbody id="tow-rows"></tbody>
        </table>
        <p id="tow-empty" class="muted"></p>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/tow.js"></script>
</body>
</html>
