<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Park Now — Create Account</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="topbar">
    <a class="brand" href="index.html">🅿️ Park Now</a>
  </header>

  <main class="container">
    <section class="card" style="max-width: 420px; margin: 40px auto;">
      <h2>Create an account</h2>
      <p class="hint">Pick a role, choose a username and password.</p>
      <form id="signup-form" class="row" style="flex-direction: column; align-items: stretch;">
        <label>Role
          <select id="signup-role">
            <option value="user">🚗 User</option>
            <option value="owner">🏢 Parking Lot Owner</option>
            <option value="tow">🚛 Tow Company</option>
          </select>
        </label>
        <label>Username
          <input id="signup-username" autocomplete="off" />
        </label>
        <label>Password
          <input id="signup-password" type="password" autocomplete="new-password" />
        </label>
        <label>Confirm password
          <input id="signup-confirm" type="password" autocomplete="new-password" />
        </label>
        <button class="btn" type="submit">Create account</button>
      </form>
      <p id="signup-error" class="error"></p>
      <p class="hint">Already have an account? <a id="back-to-login" href="user.html">Log in</a>.</p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/signup.js"></script>
</body>
</html>
