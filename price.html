<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Parking Pricing — Park Now</title>

  <!-- Connect the main CSS file -->
  <link rel="stylesheet" href="css/styles.css">

  <style>
    /* Main page style */
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #eef3f9;
      color: #111827;
    }

    /* Top navigation bar */
    .top-bar {
      padding: 20px 40px;
      background: #101a30;
      color: white;
      font-size: 26px;
      font-weight: bold;
    }

    /* Main pricing page area */
    .pricing-page {
      width: 90%;
      margin: 45px auto;
    }

    /* White pricing card */
    .pricing-card {
      padding: 40px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(15, 23, 42, 0.15);
    }

    /* Pricing page title */
    .pricing-title {
      margin-top: 0;
      margin-bottom: 10px;
      font-size: 36px;
    }

    /* Text under the title */
    .pricing-description {
      margin-bottom: 30px;
      color: #64748b;
      font-size: 20px;
    }

    /* Put inputs and button in one row */
    .pricing-form {
      display: flex;
      align-items: flex-end;
      gap: 18px;
      flex-wrap: wrap;
    }

    /* Each input area */
    .pricing-field {
      flex: 1;
      min-width: 220px;
    }

    /* Input label style */
    .pricing-field label {
      display: block;
      margin-bottom: 8px;
      color: #64748b;
      font-size: 17px;
    }

    /* Input box style */
    .pricing-field input {
      width: 100%;
      height: 58px;
      padding: 0 16px;
      border: 2px solid #dbe3ee;
      border-radius: 12px;
      box-sizing: border-box;
      font-size: 17px;
    }

    /* Calculate button */
    .calculate-button {
      height: 58px;
      padding: 0 34px;
      border: none;
      border-radius: 12px;
      background: #2563eb;
      color: white;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
    }

    /* Button color when the mouse is over it */
    .calculate-button:hover {
      background: #1d4ed8;
    }

    /* Result box */
    .price-box {
      display: none;
      width: fit-content;
      min-width: 240px;
      margin-top: 30px;
      padding: 22px 30px;
      background: #eef4ff;
      border: 2px solid #2563eb;
      border-radius: 14px;
      color: #1d4ed8;
      font-size: 28px;
      font-weight: bold;
    }

    /* Pricing rule information */
    .pricing-rules {
      margin-top: 35px;
      padding: 24px;
      background: #f8fafc;
      border-radius: 14px;
      font-size: 18px;
      line-height: 1.7;
    }

    /* Link back to the home page */
    .back-link {
      display: inline-block;
      margin-top: 25px;
      color: #2563eb;
      font-size: 17px;
      text-decoration: none;
    }

    .back-link:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <!-- Website top bar -->
  <header class="top-bar">
    🅿️ Park Now
  </header>

  <!-- Main pricing page -->
  <main class="pricing-page">

    <section class="pricing-card">

      <!-- Page title -->
      <h1 class="pricing-title">
        💵 Parking Pricing
      </h1>

      <p class="pricing-description">
        Enter the parking information to calculate the estimated price.
      </p>

      <!-- Parking information form -->
      <div class="pricing-form">

        <!-- License plate input -->
        <div class="pricing-field">
          <label for="plate">
            License Plate
          </label>

          <input
            id="plate"
            type="text"
            placeholder="Enter license plate"
          >
        </div>

        <!-- Parking location input -->
        <div class="pricing-field">
          <label for="location">
            Location
          </label>

          <input
            id="location"
            type="text"
            placeholder="Enter parking location"
          >
        </div>

        <!-- Parking time input -->
        <div class="pricing-field">
          <label for="hours">
            Parking Time (Hours)
          </label>

          <input
            id="hours"
            type="number"
            min="0"
            step="0.5"
            placeholder="Enter hours"
          >
        </div>

        <!-- Calculate price button -->
        <button
          id="calc-btn"
          class="calculate-button"
          type="button"
        >
          Calculate
        </button>

      </div>

      <!-- The calculated price will appear here -->
      <div id="priceBox" class="price-box"></div>

      <!-- Show the pricing rules -->
      <div class="pricing-rules">
        <strong>Pricing Rules</strong>
        <br>
        1–2 hours: $1 per hour
        <br>
        3–5 hours: $3 per hour
        <br>
        More than 5 hours: $5 per hour
      </div>

      <!-- Return to the main page -->
      <a class="back-link" href="index.html">
        ← Back to Home
      </a>

    </section>

  </main>

  <!-- Connect the pricing JavaScript file -->
  <script src="js/basicpricing.js"></script>

</body>

</html>
